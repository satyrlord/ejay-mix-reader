name: Windows Electron Build

concurrency:
  group: windows-electron-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  build-windows-electron:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint source
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Build and package Windows app (unsigned)
        run: npm run dist:win -- --config.win.signAndEditExecutable=true
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $files = Get-ChildItem release -Recurse -File
          if ($files.Count -eq 0) {
            throw "No release artifacts found under release/."
          }
          $hashLines = foreach ($file in $files) {
            $hash = Get-FileHash -Path $file.FullName -Algorithm SHA256
            "$($hash.Hash.ToLowerInvariant()) *$($file.Name)"
          }
          $hashLines | Out-File -FilePath release/SHA256SUMS.txt -Encoding utf8

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: electron-windows-build
          path: release/**
          if-no-files-found: error

  release-windows-electron:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint source
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Build and package Windows app (unsigned)
        run: npm run dist:win -- --config.win.signAndEditExecutable=true
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $files = Get-ChildItem release -Recurse -File
          if ($files.Count -eq 0) {
            throw "No release artifacts found under release/."
          }
          $hashLines = foreach ($file in $files) {
            $hash = Get-FileHash -Path $file.FullName -Algorithm SHA256
            "$($hash.Hash.ToLowerInvariant()) *$($file.Name)"
          }
          $hashLines | Out-File -FilePath release/SHA256SUMS.txt -Encoding utf8

      - name: Upload release artifacts
        uses: actions/upload-artifact@v5
        with:
          name: electron-windows-release-${{ github.ref_name }}
          path: release/**
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/**/*.exe
            release/**/*.blockmap
            release/SHA256SUMS.txt
