name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  deployments: read
  pages:    write
  id-token: write

# Only one deployment at a time; cancel in-flight runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read GitHub Pages deployment count
        id: deployment_count
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const deployments = await github.paginate(github.rest.repos.listDeployments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: "github-pages",
              per_page: 100,
            });

            // The current workflow run will publish the next deployment.
            return String(deployments.length + 1);

      - name: Build site
        env:
          EJAY_GITHUB_DEPLOYMENT_COUNT: ${{ steps.deployment_count.outputs.result }}
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id:   deployment
        uses: actions/deploy-pages@v5
